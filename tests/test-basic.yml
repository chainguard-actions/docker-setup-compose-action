name: Test basic usage (default version)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
      - name: Assert docker compose is available
        run: |
          echo "Checking docker compose availability..."
          if ! docker compose version; then
            echo "FAIL: 'docker compose' command not found or failed"
            exit 1
          fi
          echo "PASS: docker compose is available"
      - name: Assert compose version output is non-empty
        run: |
          VERSION_OUTPUT=$(docker compose version 2>&1)
          echo "actual: $VERSION_OUTPUT"
          if [ -z "$VERSION_OUTPUT" ]; then
            echo "FAIL: docker compose version output is empty"
            exit 1
          fi
          echo "PASS: docker compose version output is non-empty"
