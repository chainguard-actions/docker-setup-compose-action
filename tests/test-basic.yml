name: Test basic usage (default version)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          cache-binary: 'false'
      - name: Assert docker compose is available
        run: |
          echo "Checking docker compose version..."
          docker compose version
          if [ $? -ne 0 ]; then
            echo "FAIL: docker compose command failed"
            exit 1
          fi
          echo "PASS: docker compose is available"
