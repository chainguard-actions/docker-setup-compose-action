name: Test with cache disabled
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-compose
        uses: .
        with:
          version: 'v2.32.4'
          cache-binary: 'false'
      - name: Assert docker compose is available even without cache
        run: |
          echo "Checking docker compose availability..."
          if ! docker compose version; then
            echo "FAIL: docker compose command not available"
            exit 1
          fi
          echo "PASS: docker compose is available"
