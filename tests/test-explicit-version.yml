name: Test explicit version input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: 'v2.32.4'
          cache-binary: 'false'
      - name: Assert docker compose version matches requested
        run: |
          echo "Checking docker compose version..."
          COMPOSE_VERSION=$(docker compose version --short)
          echo "actual: $COMPOSE_VERSION"
          if [ "$COMPOSE_VERSION" != "2.32.4" ]; then
            echo "FAIL: expected version '2.32.4' but got '$COMPOSE_VERSION'"
            exit 1
          fi
          echo "PASS: docker compose version is $COMPOSE_VERSION"
