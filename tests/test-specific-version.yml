name: Test specific version input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup-compose
        uses: .
        with:
          version: 'v2.32.4'
          cache-binary: 'false'
      - name: Assert docker compose version matches requested
        run: |
          echo "Checking docker compose version..."
          VERSION_OUTPUT=$(docker compose version 2>&1)
          echo "Version output: $VERSION_OUTPUT"
          if ! echo "$VERSION_OUTPUT" | grep -q "2.32.4"; then
            echo "FAIL: expected version 2.32.4 in output, got: $VERSION_OUTPUT"
            exit 1
          fi
          echo "PASS: docker compose version 2.32.4 is installed"
